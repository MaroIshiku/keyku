# ZimaOS optimized compose.
# No local build, no relative bind paths: ZimaOS only pulls GHCR and stores data below /DATA/AppData.

services:
  ish-keyvault:
    image: ghcr.io/maroishiku/ish-keyvault:latest
    container_name: ish-keyvault
    restart: unless-stopped
    pull_policy: always
    init: true

    ports:
      - "8080:3000"

    volumes:
      - /DATA/AppData/ish-keyvault/data:/app/data

    environment:
      - CSV_PATH=/app/data/keys.csv
      - USERS_PATH=/app/data/users.json
      - REACTIVATION_REQUESTS_PATH=/app/data/reactivation-requests.json
      - PASSWORD_RESET_REQUESTS_PATH=/app/data/password-reset-requests.json
      - SESSION_SECRET_FILE=/app/data/session-secret.txt
      - PUBLIC_DIR=/app/public
      # Optional: set to your external HTTPS URL so generated share links use the public host.
      # Example: https://keys.example.com
      - PUBLIC_BASE_URL=
      - PORT=3000

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/api/auth/me', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
