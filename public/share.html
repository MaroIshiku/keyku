<!doctype html>
<html lang="en" data-theme="lavender" data-mode="system" data-resolved-mode="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FFFBFF" />
  <meta name="application-name" content="Keyku - Key Vault" />
  <meta name="apple-mobile-web-app-title" content="Keyku" />
  <title>Keyku Share</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/icon-512.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/design-system/components.css" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="icon-sprite" aria-hidden="true"></div>
  <main class="psu-setup-screen">
    <section class="psu-auth-window keyku-share-card">
      <div class="psu-setup-brand">
        <div class="psu-setup-logo" aria-hidden="true"><img src="/assets/logos/keyku.png" alt="" /></div>
        <div>
          <h1 id="share-title" class="psu-setup-title">Loading key...</h1>
          <p id="share-meta" class="psu-setup-subtitle">Keyku - Key Vault</p>
        </div>
      </div>
      <div id="share-key" class="keyku-secret-preview keyku-share-key">&#9679;&#9679;&#9679;&#9679;&#9679; - &#9679;&#9679;&#9679;&#9679;&#9679; - &#9679;&#9679;&#9679;&#9679;&#9679;</div>
      <div class="psu-card-actions">
        <button id="share-copy-key" class="psu-button psu-button--filled" type="button">Copy key</button>
        <a id="share-redeem" class="psu-button psu-button--tonal" target="_blank" rel="noopener noreferrer">Redeem</a>
        <a id="share-steam" class="psu-button psu-button--outlined" target="_blank" rel="noopener noreferrer">Steam</a>
        <a id="share-steamdb" class="psu-button psu-button--outlined" target="_blank" rel="noopener noreferrer">SteamDB</a>
      </div>
      <p id="share-error" class="psu-field-error" role="status" aria-live="polite"></p>
    </section>
  </main>
  <div id="toast" class="keyku-toast" role="status" aria-live="polite"></div>
  <script type="module" src="/share.js"></script>
</body>
</html>
